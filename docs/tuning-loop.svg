<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>loadtune structured tuning loop</title>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5f6b7a"/></marker>
</defs>
<g>
<rect x="280" y="16" width="160" height="44" rx="4" fill="#dbe7f4" stroke="#4878a8"/>
<text x="360" y="34" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a57">1. Profile</text>
<text x="360" y="50" text-anchor="middle" font-size="11" fill="#41526b">short instrumented run</text>
<rect x="280" y="92" width="160" height="44" rx="4" fill="#dbe7f4" stroke="#4878a8"/>
<text x="360" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a57">2. Classify bottleneck</text>
<text x="360" y="126" text-anchor="middle" font-size="11" fill="#41526b">where does time go?</text>
<rect x="24" y="178" width="208" height="60" rx="4" fill="#f0f2f5" stroke="#9aa4b2"/>
<text x="128" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3540">input-bound</text>
<text x="128" y="214" text-anchor="middle" font-size="11" fill="#4d5866">workers, prefetch, caching,</text>
<text x="128" y="228" text-anchor="middle" font-size="11" fill="#4d5866">transform placement</text>
<rect x="256" y="178" width="208" height="60" rx="4" fill="#f0f2f5" stroke="#9aa4b2"/>
<text x="360" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3540">compute-bound</text>
<text x="360" y="214" text-anchor="middle" font-size="11" fill="#4d5866">compile, AMP, channels_last,</text>
<text x="360" y="228" text-anchor="middle" font-size="11" fill="#4d5866">fused optimizer</text>
<rect x="488" y="178" width="208" height="60" rx="4" fill="#f0f2f5" stroke="#9aa4b2"/>
<text x="592" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3540">transfer / memory-bound</text>
<text x="592" y="214" text-anchor="middle" font-size="11" fill="#4d5866">pin_memory, non_blocking,</text>
<text x="592" y="228" text-anchor="middle" font-size="11" fill="#4d5866">batch size, grad accumulation</text>
<rect x="280" y="278" width="160" height="44" rx="4" fill="#dbe7f4" stroke="#4878a8"/>
<text x="360" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a57">3. Trial candidates</text>
<text x="360" y="312" text-anchor="middle" font-size="11" fill="#41526b">short, isolated, measured</text>
<rect x="280" y="354" width="160" height="44" rx="4" fill="#dbe7f4" stroke="#4878a8"/>
<text x="360" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3a57">4. Adopt best config</text>
<text x="360" y="388" text-anchor="middle" font-size="11" fill="#41526b">cheapest within noise</text>
<rect x="520" y="354" width="176" height="60" rx="4" fill="#e2f0e2" stroke="#5a9a5a"/>
<text x="608" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#27502a">5. Stop &amp; verify</text>
<text x="608" y="392" text-anchor="middle" font-size="11" fill="#3d6442">loss parity, repeat runs</text>
</g>
<g fill="none" stroke="#5f6b7a" stroke-width="1.5">
<path d="M360 60 V92" marker-end="url(#ar)"/>
<path d="M300 136 L128 178" marker-end="url(#ar)"/>
<path d="M360 136 V178" marker-end="url(#ar)"/>
<path d="M420 136 L592 178" marker-end="url(#ar)"/>
<path d="M128 238 L300 278" marker-end="url(#ar)"/>
<path d="M360 238 V278" marker-end="url(#ar)"/>
<path d="M592 238 L420 278" marker-end="url(#ar)"/>
<path d="M360 322 V354" marker-end="url(#ar)"/>
<path d="M280 376 H160 Q140 376 140 356 V58 Q140 38 160 38 H280" marker-end="url(#ar)"/>
<path d="M440 376 H520" marker-end="url(#ar)" stroke-dasharray="4 3"/>
</g>
<text x="200" y="362" text-anchor="middle" font-size="11" fill="#4d5866">re-profile: next</text>
<text x="200" y="376" text-anchor="middle" font-size="11" fill="#4d5866">bottleneck appears</text>
<text x="480" y="368" text-anchor="middle" font-size="11" fill="#4d5866">no gain left</text>
</svg>
