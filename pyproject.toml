[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loadtune"
version = "0.1.0"
description = "Agentic profiler & tuner for ML training workloads — finds the DataLoader config your GPU was waiting for."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Marija Efremova", email = "marija@kodeollc.com" }]
keywords = ["pytorch", "profiling", "dataloader", "performance", "agent"]
dependencies = [
    "torch>=2.2",
    "numpy",
    "psutil",
    "matplotlib",
]

[project.optional-dependencies]
llm = ["anthropic>=0.40"]
vision = ["torchvision"]
nlp = ["transformers", "datasets"]
all = ["loadtune[llm,vision,nlp]"]

[project.scripts]
loadtune = "loadtune.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/loadtune"]
